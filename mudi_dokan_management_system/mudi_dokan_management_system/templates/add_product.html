{% extends "base.html" %}

{% block content %}

<section class="form-page">
    <div class="form-box">
        <h2>Add New Product</h2>
        <p class="form-subtitle">Fill this form to add a new grocery product.</p>

        <form method="POST" class="main-form" onsubmit="return validateProductForm();">
            <label>Product Name</label>
            <input type="text" name="name" id="name" placeholder="Example: Miniket Rice">

            <label>Category</label>
            <select name="category" id="category">
                <option value="">Select category</option>
                <option value="Rice & Grains">Rice & Grains</option>
                <option value="Oil">Oil</option>
                <option value="Grocery">Grocery</option>
                <option value="Snacks">Snacks</option>
                <option value="Beverage">Beverage</option>
                <option value="Toiletries">Toiletries</option>
                <option value="Others">Others</option>
            </select>

            <label>Supplier</label>
            <input type="text" name="supplier" id="supplier" placeholder="Example: City Wholesale">

            <label>Unit</label>
            <select name="unit" id="unit">
                <option value="">Select unit</option>
                <option value="piece">piece</option>
                <option value="kg">kg</option>
                <option value="liter">liter</option>
                <option value="packet">packet</option>
                <option value="box">box</option>
            </select>

            <label>Buy Price</label>
            <input type="number" step="0.01" name="buy_price" id="buy_price" placeholder="Example: 68">

            <label>Sell Price</label>
            <input type="number" step="0.01" name="sell_price" id="sell_price" placeholder="Example: 75">

            <label>Opening Stock</label>
            <input type="number" name="stock" id="stock" placeholder="Example: 50">

            <label>Low Stock Limit</label>
            <input type="number" name="low_stock_limit" id="low_stock_limit" placeholder="Example: 10">

            <button type="submit">Save Product</button>
        </form>
    </div>
</section>

{% endblock %}
