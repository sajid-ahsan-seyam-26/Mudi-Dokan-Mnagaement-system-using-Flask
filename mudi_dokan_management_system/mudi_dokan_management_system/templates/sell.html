{% extends "base.html" %}

{% block content %}

<section class="form-page">
    <div class="form-box">
        <h2>Sell {{ product.name }}</h2>
        <p class="form-subtitle">
            Price: ৳{{ "%.2f"|format(product.sell_price) }} / {{ product.unit }} | Available Stock: {{ product.stock }} {{ product.unit }}
        </p>

        <form method="POST" class="main-form" onsubmit="return validateSaleForm({{ product.stock }});">
            <label>Customer Name</label>
            <input type="text" name="customer_name" id="customer_name" placeholder="Enter customer name" value="Walk-in Customer">

            <label>Customer Phone</label>
            <input type="text" name="customer_phone" id="customer_phone" placeholder="Optional phone number">

            <label>Quantity</label>
            <input type="number" name="quantity" id="quantity" placeholder="Enter quantity" oninput="calculateTotal({{ product.sell_price }});">

            <label>Sale Date</label>
            <input type="date" name="sale_date" id="sale_date" value="{{ today }}">

            <div class="total-box">
                Total Amount: <span id="totalAmount">৳0.00</span>
            </div>

            <button type="submit">Complete Sale</button>
        </form>
    </div>
</section>

{% endblock %}
